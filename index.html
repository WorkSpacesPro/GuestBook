<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GB.OoO · 浮光留言本 · 动态背景</title>
    <!-- 外部 CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Font Awesome 6 图标库 (可替换为本地资源) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="page-wrapper">
    <!-- 动态圆形背景 (纯CSS动画) -->
    <ul class="circles">
        <li></li><li></li><li></li><li></li><li></li>
        <li></li><li></li><li></li><li></li><li></li>
        <li></li><li></li><li></li><li></li>
    </ul>

    <!-- 导航栏 -->
    <div class="navbar">
        <div class="nav-container">
            <!-- 左侧：移动端显示切换按钮组 (桌面端隐藏) -->
            <div class="mobile-actions" id="mobileActions">
                <button id="mobileDarkToggle" class="icon-btn" aria-label="Dark mode toggle"><i class="fas fa-moon"></i></button>
                <button id="mobileLangToggle" class="icon-btn" aria-label="Language toggle"><i class="fas fa-globe"></i></button>
            </div>

            <!-- Logo 区域 -->
            <div class="logo-area">
                <i class="fas fa-feather-alt"></i>
                <span data-i18n="site_name">Guestbook</span>
            </div>

            <!-- 右侧导航链接 (包含两个切换按钮的桌面版，移动端会隐藏) -->
            <ul class="nav-links">
                <li><a href="#" data-i18n="nav_home"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="#" data-i18n="nav_explore"><i class="fas fa-compass"></i> Explore</a></li>
                <li><a href="#" data-i18n="nav_guestbook" style="border-bottom-color:var(--link-hover);"><i class="fas fa-book-open"></i> Guestbook</a></li>
                <li><a href="#" data-i18n="nav_about"><i class="fas fa-user"></i> About</a></li>
                <!-- 桌面版切换按钮 (移动端会隐藏) -->
                <li class="desktop-only"><button id="darkModeToggle" class="icon-btn"><i class="fas fa-moon"></i></button></li>
                <li class="desktop-only"><button id="langToggle" class="icon-btn"><i class="fas fa-globe"></i></button></li>
            </ul>
        </div>
    </div>

    <!-- 主内容区 -->
    <div class="main-content">
        <div class="guestbook-card">
            <div class="guestbook-header">
                <h1><i class="fas fa-pen-fancy"></i> <span data-i18n="title">Floating Guestbook</span></h1>
                <p><span data-i18n="subtitle">Leave your footprint · Powered by GitHub Discussions</span></p>
            </div>
            <div id="giscus-container" class="giscus-container"></div>
        </div>
    </div>

    <!-- 页脚 (邮箱修改) -->
    <div class="footer">
        <div class="footer-content">
            <span data-i18n="copyright">© 2025  Guestbook</span>
            <span class="email-link">
                <i class="fas fa-envelope"></i>
                <a href="mailto:hello@domainname.plus">Hello#DomainName.Plus</a>
            </span>
            <span data-i18n="powered">Powered by <a href="https://giscus.app" target="_blank">Giscus</a></span>
        </div>
    </div>
</div>

<!-- 外部 JavaScript -->
<script src="assets/js/main.js"></script>
</body>
</html>
